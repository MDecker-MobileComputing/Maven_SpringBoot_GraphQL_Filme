
# Das "!" hinter einem Datentyp bedeutet "non-null": Das Feld muss immer einen Wert haben.

type Film {
  id              : ID!
  titel           : String!
  genre           : Genre!
  erscheinungsjahr: Int!
  bewertung       : Float # muss zwischen 0.0 und 10.0 liegen
  regisseur       : String
  verfuegbar      : Boolean!
}

enum Genre {
	ACTION,
	DOKUMENTATION,
	DRAMA,
	FANTASY,
	KOMOEDIE,	
	SCIENCE_FICTION,
	THRILLER	
}


type Query {
  filme                        : [Film!]!
  filmById(id: ID!)            : Film     # ist "null" wenn kein Film mit der angegebenen ID existiert
  filmeNachGenre(genre: Genre!): [Film!]!
  verfuegbareFilme             : [Film!]!
}

type Mutation {

  filmAnlegen(
    titel           : String!
    genre           : Genre!
    erscheinungsjahr: Int!
    bewertung       : Float
    regisseur       : String
    verfuegbar      : Boolean!
  ): Film!

  filmBewertungAktualisieren(
    id       : ID!
    bewertung: Float!
  ): Film

  filmLoeschen(id: ID!): Boolean!

}