
type Film {

  id              : ID!
  titel           : String!
  genre           : Genre!
  erscheinungsjahr: Int!
  bewertung       : Float
  regisseur       : String
  verfuegbar      : Boolean!
}

enum Genre {

	ACTION,
	DOKUMENTATION,
	DRAMA,
	FANTASY,
	KOMOEDIE,
	SCIENCE_FICTION,
	THRILLER
}

enum FilmSortBy {

  ID,
  TITEL,
  ERSCHEINUNGSJAHR,
  BEWERTUNG,
  REGISSEUR,
  VERFUEGBAR
}

enum SortDirection {

  ASC,
  DESC
}


type Query {

  filme(sortBy: FilmSortBy, direction: SortDirection): [Film!]!
  filmById(id: ID!)            : Film     # ist "null" wenn kein Film mit der angegebenen ID existiert
  filmeNachGenre(genre: Genre!): [Film!]!
  verfuegbareFilme             : [Film!]!
}

type Mutation {

  filmAnlegen(
    titel           : String!
    genre           : Genre!
    erscheinungsjahr: Int!
    bewertung       : Float
    regisseur       : String
    verfuegbar      : Boolean!
  ): Film!

  filmBewertungAktualisieren(
    id       : ID!
    bewertung: Float!
  ): Film

  filmVerfuegbarkeitAktualisieren(
    id        : ID!
    verfuegbar: Boolean!
  ): Film

  filmLoeschen( id: ID! ): Boolean!

}


type FilmAenderung {

  filmId   : ID!
  art      : String!
  zeitpunkt: String!
  film     : Film
}

type Subscription {

  filmAenderungen: FilmAenderung!
}